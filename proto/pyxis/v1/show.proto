syntax = "proto3";

package pyxis.v1;

option go_package = "github.com/go-go-golems/pyxis/gen/proto/pyxis/v1;pyxisv1";

message Show {
  int32  id            = 1;
  string artist        = 2;
  string date          = 3;
  string doors_time    = 4;
  string start_time    = 5;
  string age           = 6;
  string price         = 7;
  string genre         = 8;
  string description   = 9;
  repeated LineupEntry lineup = 10;
  string flyer_url     = 11;
  string status        = 12;
  int32  submission_id = 13;
  int32  artist_id     = 14;
  string created_at    = 15;
  string updated_at    = 16;

  message LineupEntry {
    string artist     = 1;
    string role       = 2;
    string start_time = 3;
    string end_time   = 4;
  }
}

message AppShow {
  int32  id       = 1;
  string artist   = 2;
  string date     = 3;
  string doors    = 4;
  string age      = 5;
  string price    = 6;
  string status   = 7;
  string genre    = 8;
  int32  draw     = 9;
  int32  capacity = 10;
  bool   pinned   = 11;
  string notes    = 12;
}

message ArchivedShow {
  int32  id     = 1;
  string artist = 2;
  string date   = 3;
  string genre  = 4;
  int32  draw   = 5;
}

message ArchiveStats {
  int32 total_shows      = 1;
  int32 total_attendance = 2;
  int32 years_running    = 3;
  int32 unique_artists   = 4;
}

message BookingFormData {
  string artist_name     = 1;
  string genre           = 2;
  string preferred_date  = 3;
  int32  expected_draw   = 4;
  string links           = 5;
  string tech_rider      = 6;
  string message         = 7;
}

message ShowList {
  repeated Show shows = 1;
}

message ArchivedShowList {
  repeated ArchivedShow shows = 1;
}

message BookingConfirmation {
  bool  success       = 1;
  int32 submission_id = 2;
}
