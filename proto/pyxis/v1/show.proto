syntax = "proto3";

package pyxis.v1;

option go_package = "github.com/go-go-golems/pyxis/gen/proto/pyxis/v1;pyxisv1";

message Show {
  int32  id            = 1;
  string artist        = 2;
  string date          = 3;
  string doors_time    = 4;
  string start_time    = 5;
  string age           = 6;
  string price         = 7;
  string genre         = 8;
  string description   = 9;
  string notes         = 17;
  repeated LineupEntry lineup = 10;
  string flyer_url     = 11;
  int32  draw          = 18;
  int32  capacity      = 19;
  string status        = 12;
  int32  submission_id = 13;
  int32  artist_id     = 14;
  string created_at    = 15;
  string updated_at    = 16;

  message LineupEntry {
    string artist     = 1;
    string role       = 2;
    string start_time = 3;
    string end_time   = 4;
  }
}

message AppShow {
  int32  id       = 1;
  string artist   = 2;
  string date     = 3;
  string doors    = 4;
  string age      = 5;
  string price    = 6;
  string status   = 7;
  string genre    = 8;
  int32  draw     = 9;
  int32  capacity = 10;
  bool   pinned   = 11;
  string notes    = 12;
}

message ArchivedShow {
  int32  id     = 1;
  string artist = 2;
  string date   = 3;
  string genre  = 4;
  int32  draw   = 5;
}

message ArchiveStats {
  int32 total_shows      = 1;
  int32 total_attendance = 2;
  int32 years_running    = 3;
  int32 unique_artists   = 4;
}

message BookingFormData {
  string artist_name     = 1;
  string genre           = 2;
  string preferred_date  = 3;
  int32  expected_draw   = 4;
  string links           = 5;
  string tech_rider      = 6;
  string message         = 7;
}

message ShowList {
  repeated Show shows = 1;
}

message ArchivedShowList {
  repeated ArchivedShow shows = 1;
}

message BookingConfirmation {
  bool  success       = 1;
  int32 submission_id = 2;
}

message Submission {
  int32  id             = 1;
  int32  artist_id      = 2;
  string artist_name    = 3;
  string preferred_date = 4;
  string genre          = 5;
  int32  expected_draw  = 6;
  string links          = 7;
  string tech_rider     = 8;
  string message        = 9;
  string contact_discord = 10;
  string status         = 11;
  int32  reviewed_by    = 12;
  string reviewed_at    = 13;
  string created_at     = 14;
}

message SubmissionList {
  repeated Submission submissions = 1;
}

message User {
  int32  id              = 1;
  string discord_id      = 2;
  string discord_username = 3;
  string avatar_url      = 4;
  string role            = 5;
  string created_at      = 6;
  string last_login_at   = 7;
}

message AuthSession {
  bool   authenticated = 1;
  User   user          = 2;
  string space_name    = 3;
}

message Artist {
  int32  id         = 1;
  string name       = 2;
  string genre      = 3;
  string links      = 4;
  string notes      = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ArtistList {
  repeated Artist artists = 1;
}

message CalendarHold {
  int32  id         = 1;
  string date       = 2;
  string label      = 3;
}

message CalendarBlocked {
  int32  id     = 1;
  string date   = 2;
  string reason = 3;
}

message CalendarResponse {
  repeated CalendarHold    holds   = 1;
  repeated CalendarBlocked blocked = 2;
}

message AttendanceLog {
  int32  id             = 1;
  int32  show_id        = 2;
  string artist         = 3;
  string date           = 4;
  int32  draw           = 5;
  string notes          = 6;
  bool   incident       = 7;
  string incident_notes = 8;
  int32  logged_by      = 9;
  string created_at     = 10;
  string updated_at     = 11;
}

message AttendanceLogList {
  repeated AttendanceLog logs = 1;
}

message AuditLogEntry {
  int32  id          = 1;
  string actor       = 2;
  int32  actor_id    = 3;
  string action      = 4;
  string entity_type = 5;
  int32  entity_id   = 6;
  string metadata    = 7;
  string created_at  = 8;
}

message AuditLogEntryList {
  repeated AuditLogEntry entries = 1;
}

message Settings {
  int32  id                       = 1;
  string space_name               = 2;
  string tagline                  = 3;
  string address                  = 4;
  int32  capacity                 = 5;
  string contact_email            = 6;
  string website                  = 7;
  string discord_guild_id         = 8;
  string discord_ch_upcoming      = 9;
  string discord_ch_announcements = 10;
  string discord_ch_staff         = 11;
  string discord_ch_bookings      = 12;
  bool   setup_complete           = 13;
  string updated_at               = 14;
  string timezone                 = 15;
  string booking_email            = 16;
  bool   auto_archive             = 17;
  bool   discord_posting          = 18;
  bool   safe_space_required      = 19;
}

message SuccessResponse {
  bool success = 1;
}

message ErrorResponse {
  Error error = 1;
  message Error {
    string code    = 1;
    string message = 2;
  }
}

message FlyerUploadResponse {
  string url = 1;
}
