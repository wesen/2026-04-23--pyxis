version: "2"
sql:
  - engine: "postgresql"
    queries: "pkg/db/queries"
    schema: "pkg/db/migrations"
    gen:
      go:
        package: "db"
        out: "pkg/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_interface: true
        emit_empty_slices: true
