name: publish-image

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'ttmp/**'
      - '*.md'

permissions:
  contents: read
  packages: write
  pull-requests: read

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/pyxis
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
      - name: Build and optionally push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Open GitOps image bump PRs
        if: github.event_name == 'push'
        env:
          GITOPS_PR_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
          GH_TOKEN: ${{ secrets.GITOPS_PR_TOKEN }}
        run: |
          if [ -z "${GITOPS_PR_TOKEN}" ]; then
            echo "GITOPS_PR_TOKEN is required to open GitOps deployment PRs" >&2
            exit 1
          fi
          IMAGE="ghcr.io/${{ github.repository_owner }}/pyxis:sha-${GITHUB_SHA::7}"
          python3 scripts/open_gitops_pr.py --image "${IMAGE}"
