version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: pyxis-db
    environment:
      POSTGRES_USER: pyxis
      POSTGRES_PASSWORD: pyxis
      POSTGRES_DB: pyxis
    ports:
      - "5433:5432"
    volumes:
      - pyxis-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pyxis -d pyxis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pyxis-db-data:
