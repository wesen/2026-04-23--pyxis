  title: Organism Modal default — prototype vs Storybook
  level: organism
  component: modal
  state: default
  prototype_source: prototype-design/Pyxis Public Site.html
  storybook_story_id: organisms-organism-diff-fixture--default

original:
  name: prototype-modal-default
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport: { width: 1200, height: 760 }
  root_selector: "#organism-capture-root"
  prepare:
    type: script
    wait_for: "window.React && window.ReactDOM && window.Modal && window.Field && window.Input && window.Btn"
    wait_for_timeout_ms: 30000
    script_file: /home/manuel/code/wesen/2026-04-23--pyxis/prototype-design/visual-diff/scripts/fixtures/organism-fixture-prepare.js
    after_wait_ms: 1000

react:
  name: storybook-modal-default
  url: http://localhost:6006/iframe.html?id=organisms-organism-diff-fixture--default&viewMode=story
  wait_ms: 1000
  viewport: { width: 1200, height: 760 }
  root_selector: "[data-fixture='pyxis-organisms']"
  prepare:
    type: script
    wait_for: "document.querySelector('[data-fixture=\"pyxis-organisms\"] [data-comp=\"modal-default\"] [data-pyxis-component=\"modal\"][data-pyxis-part=\"panel\"]') && (!document.fonts || document.fonts.status === 'loaded')"
    wait_for_timeout_ms: 30000
    script: |
      document.body.style.margin = '0';
      document.documentElement.style.background = '#F3F1EB';
    after_wait_ms: 250

sections:
  - name: panel
    selector_original: "[data-comp='modal-default'] > div > div"
    selector_react: "[data-comp='modal-default'] [data-pyxis-component='modal'][data-pyxis-part='panel']"
  - name: header
    selector_original: "[data-comp='modal-default'] > div > div > div:nth-child(1)"
    selector_react: "[data-comp='modal-default'] [data-pyxis-component='modal'][data-pyxis-part='header']"
  - name: body
    selector_original: "[data-comp='modal-default'] > div > div > div:nth-child(2)"
    selector_react: "[data-comp='modal-default'] [data-pyxis-component='modal'][data-pyxis-part='body']"
  - name: footer
    selector_original: "[data-comp='modal-default'] > div > div > div:nth-child(3)"
    selector_react: "[data-comp='modal-default'] [data-pyxis-component='modal'][data-pyxis-part='footer']"

styles:
