metadata:
  slug: atoms-button-primary
  title: Atom Button primary — prototype vs Storybook
  level: atom
  component: button
  state: primary-with-chevron
  prototype_source: prototype-design/Pyxis Public Site.html
  storybook_story_id: atoms-atom-diff-fixture--default

original:
  name: prototype-button-primary
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport: { width: 1200, height: 360 }
  root_selector: "#atom-capture-root"
  prepare:
    type: script
    wait_for: "window.React && window.ReactDOM && window.Btn && window.Badge && window.Input && window.Select && window.Avatar"
    wait_for_timeout_ms: 30000
    script_file: /home/manuel/code/wesen/2026-04-23--pyxis/prototype-design/visual-diff/scripts/fixtures/atom-fixture-prepare.js
    after_wait_ms: 1000

react:
  name: storybook-button-primary
  url: http://localhost:6006/iframe.html?id=atoms-atom-diff-fixture--default&viewMode=story
  wait_ms: 1000
  viewport: { width: 1200, height: 360 }
  root_selector: "[data-fixture='pyxis-atoms']"
  prepare:
    type: script
    wait_for: "document.querySelector('[data-fixture=\"pyxis-atoms\"] [data-comp=\"button-primary\"] [data-pyxis-component=\"button\"][data-pyxis-part=\"root\"]') && (!document.fonts || document.fonts.status === 'loaded')"
    wait_for_timeout_ms: 30000
    script: |
      document.body.style.margin = '0';
      document.documentElement.style.background = '#F3F1EB';
    after_wait_ms: 250

sections:
  - name: component
    selector_original: "[data-comp='button-primary']"
    selector_react: "[data-comp='button-primary']"
  - name: button
    selector_original: "[data-comp='button-primary'] button"
    selector_react: "[data-comp='button-primary'] [data-pyxis-component='button'][data-pyxis-part='root']"

styles:
  - name: root
    selector_original: "[data-comp='button-primary'] button"
    selector_react: "[data-comp='button-primary'] [data-pyxis-component='button'][data-pyxis-part='root']"
    include_bounds: true
    props: [display, position, box-sizing, width, height, min-width, min-height, margin, padding, gap, font-family, font-size, font-weight, line-height, letter-spacing, color, background, background-color, border, border-color, border-width, border-style, border-radius, box-shadow, opacity, align-items, justify-content, white-space]
  - name: label
    selector_original: "[data-comp='button-primary'] button"
    selector_react: "[data-comp='button-primary'] [data-pyxis-component='button'][data-pyxis-part='label']"
    include_bounds: true
    props: [font-family, font-size, font-weight, line-height, letter-spacing, color]

output:
  dir: /home/manuel/code/wesen/2026-04-23--pyxis/prototype-design/visual-comparisons/component-system/atoms/button-primary
  write_json: true
  write_markdown: true
  write_pngs: true
  write_prepared_html: true
  write_inspect_json: true
  validate_pngs: true

modes: [capture, cssdiff, matched-styles, pixeldiff, html-report]
