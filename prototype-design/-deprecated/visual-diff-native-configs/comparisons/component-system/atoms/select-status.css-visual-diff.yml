  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport: { width: 1200, height: 420 }
  root_selector: "#atom-capture-root"
  prepare:
    type: script
    wait_for: "window.React && window.ReactDOM && window.Btn && window.Badge && window.Input && window.Select && window.Avatar"
    wait_for_timeout_ms: 30000
    script_file: /home/manuel/code/wesen/2026-04-23--pyxis/prototype-design/visual-diff/scripts/fixtures/atom-fixture-prepare.js
    after_wait_ms: 1000

react:
  name: storybook-select-status
  url: http://localhost:6006/iframe.html?id=atoms-atom-diff-fixture--default&viewMode=story
  wait_ms: 1000
  viewport: { width: 1200, height: 420 }
  root_selector: "[data-fixture='pyxis-atoms']"
  prepare:
    type: script
    wait_for: "document.querySelector('[data-fixture=\"pyxis-atoms\"] [data-comp=\"select-status\"] [data-pyxis-component=\"select\"][data-pyxis-part=\"control\"]') && (!document.fonts || document.fonts.status === 'loaded')"
    wait_for_timeout_ms: 30000
    script: |
      document.body.style.margin = '0';
      document.documentElement.style.background = '#F3F1EB';
    after_wait_ms: 250

sections:
