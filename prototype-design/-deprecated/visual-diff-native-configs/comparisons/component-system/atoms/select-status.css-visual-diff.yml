    selector_react: "[data-comp='select-status'] [data-pyxis-component='select'][data-pyxis-part='control']"
    include_bounds: true
    props: [position, box-sizing, width, height, margin, padding, font-family, font-size, font-weight, line-height, letter-spacing, color, background, background-color, border, border-color, border-width, border-style, border-radius, box-shadow, opacity]

output:
