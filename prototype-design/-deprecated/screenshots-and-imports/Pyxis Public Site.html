<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ppxis · Public site</title>
<meta name="viewport" content="width=1600" />
<style>
  html, body { margin: 0; padding: 0; background: #E8E4DA; font-family: "Inter", -apple-system, sans-serif; }
  #root { min-height: 100vh; }
  .px-artboard-frame { background: #fff; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="lib/tokens.js"></script>
<script src="lib/data.js"></script>
<script type="text/babel" src="lib/components.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/ppxis.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas initialZoom={0.55}>
      <DCSection id="desktop" title="01 · Desktop" subtitle="Poster-grid shell · 920px · five pages">
        <DCArtboard id="d-shows"   label="Shows"        width={920} height={1460}><PPXDesktop page="shows" /></DCArtboard>
        <DCArtboard id="d-detail"  label="Show detail"  width={920} height={1100}><PPXDesktop page="detail" /></DCArtboard>
        <DCArtboard id="d-archive" label="Archive"      width={920} height={1400}><PPXDesktop page="archive" /></DCArtboard>
        <DCArtboard id="d-book"    label="Book us"      width={920} height={1200}><PPXDesktop page="book" /></DCArtboard>
        <DCArtboard id="d-about"   label="About"        width={920} height={1200}><PPXDesktop page="about" /></DCArtboard>
      </DCSection>
      <DCSection id="mobile" title="02 · Mobile" subtitle="390px · hamburger nav · 1-up stacks">
        <DCArtboard id="m-shows"   label="Shows"        width={390} height={1780}><PPXMobile page="shows" /></DCArtboard>
        <DCArtboard id="m-detail"  label="Show detail"  width={390} height={1500}><PPXMobile page="detail" /></DCArtboard>
        <DCArtboard id="m-archive" label="Archive"      width={390} height={1700}><PPXMobile page="archive" /></DCArtboard>
        <DCArtboard id="m-book"    label="Book us"      width={390} height={1700}><PPXMobile page="book" /></DCArtboard>
        <DCArtboard id="m-about"   label="About"        width={390} height={1600}><PPXMobile page="about" /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
