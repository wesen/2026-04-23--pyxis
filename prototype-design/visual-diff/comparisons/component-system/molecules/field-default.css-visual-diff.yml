  title: Molecule Field default — prototype vs Storybook
  level: molecule
  component: field
  state: default
  prototype_source: prototype-design/Pyxis Public Site.html
  storybook_story_id: molecules-molecule-diff-fixture--default

original:
  name: prototype-field-default
  url: http://localhost:7070/Pyxis%20Public%20Site.html
  wait_ms: 1000
  viewport: { width: 1200, height: 760 }
  root_selector: "#molecule-capture-root"
  prepare:
    type: script
    wait_for: "window.React && window.ReactDOM && window.Card && window.Field && window.Input && window.Stat && window.Empty && window.Btn"
    wait_for_timeout_ms: 30000
    script_file: /home/manuel/code/wesen/2026-04-23--pyxis/prototype-design/visual-diff/scripts/fixtures/molecule-fixture-prepare.js
    after_wait_ms: 1000

react:
  name: storybook-field-default
  url: http://localhost:6006/iframe.html?id=molecules-molecule-diff-fixture--default&viewMode=story
  wait_ms: 1000
  viewport: { width: 1200, height: 760 }
  root_selector: "[data-fixture='pyxis-molecules']"
  prepare:
    type: script
    wait_for: "document.querySelector('[data-fixture=\"pyxis-molecules\"] [data-comp=\"field-default\"]') && (!document.fonts || document.fonts.status === 'loaded')"
    wait_for_timeout_ms: 30000
    script: |
      document.body.style.margin = '0';
      document.documentElement.style.background = '#F3F1EB';
    after_wait_ms: 250

sections:
  - name: component
    selector_original: "[data-comp='field-default']"
    selector_react: "[data-comp='field-default']"
  - name: root
    selector_original: "[data-comp='field-default'] > div"
    selector_react: "[data-comp='field-default'] [data-pyxis-component='field'][data-pyxis-part='root']"
