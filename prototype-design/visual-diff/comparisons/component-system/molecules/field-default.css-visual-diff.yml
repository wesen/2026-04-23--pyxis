    selector_react: "[data-comp='field-default'] [data-pyxis-component='input'][data-pyxis-part='control']"
  - name: hint
    selector_original: "[data-comp='field-default'] div div:last-child"
    selector_react: "[data-comp='field-default'] [data-pyxis-component='field'][data-pyxis-part='hint']"

