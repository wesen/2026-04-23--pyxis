react:
  name: storybook-textarea-notes
  url: http://localhost:6006/iframe.html?id=atoms-atom-diff-fixture--default&viewMode=story
  wait_ms: 1000
  viewport: { width: 1200, height: 650 }
  root_selector: "[data-fixture='pyxis-atoms']"
  prepare:
    type: script
    wait_for: "document.querySelector('[data-fixture=\"pyxis-atoms\"] [data-comp=\"textarea-notes\"] [data-pyxis-component=\"textarea\"][data-pyxis-part=\"control\"]') && (!document.fonts || document.fonts.status === 'loaded')"
