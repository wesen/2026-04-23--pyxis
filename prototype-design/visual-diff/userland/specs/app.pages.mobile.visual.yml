schemaVersion: pyxis.visual-suite.v1
name: app-pages-mobile
defaults:
  prototypeBase: http://localhost:7070
  storybookBase: http://localhost:6008
  viewport:
    width: 390
    height: 844
  waitMs: 1000
  threshold: 30
  inspect: rich
  variant: mobile
policy:
  bands:
    - name: accepted
      maxChangedPercent: 0.5
    - name: review
      maxChangedPercent: 10
    - name: tune-required
      maxChangedPercent: 30
    - name: major-mismatch
      maxChangedPercent: 100
acceptedDifferences: {}
targets:
  - page: dashboard
    variant: mobile
    priority: tune-first
    prototypePath: /standalone/mobile/home.html
    storyId: pyxis-app-pages-pages--dashboard-mobile
    sections:
      - name: page
        original: '[data-page="dashboard"]'
        react: '[data-page="dashboard"]'
      - name: summary
        original: '[data-page="dashboard"]'
        react: '[data-section="dashboard-summary"]'
      - name: hero
        original: '[data-section="dashboard-hero"]'
        react: '[data-section="dashboard-hero"]'
      - name: metrics
        original: '[data-section="dashboard-metrics"]'
        react: '[data-section="dashboard-metrics"]'
      - name: attention
        original: '[data-section="dashboard-attention"]'
        react: '[data-section="dashboard-attention"]'
      - name: activity
        original: '[data-section="dashboard-activity"]'
        react: '[data-section="dashboard-activity"]'

  - page: login
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/login.html
    storyId: pyxis-app-pages-pages--login-mobile
    sections:
      - name: page
        original: '[data-page="login"]'
        react: '[data-page="login"]'
  - page: shows
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/shows.html
    storyId: pyxis-app-pages-pages--shows-mobile
    sections:
      - name: page
        original: '[data-page="shows"]'
        react: '[data-page="shows"]'
  - page: show-detail
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/show-detail.html
    storyId: pyxis-app-pages-pages--show-detail-mobile
    sections:
      - name: page
        original: '[data-page="show-detail"]'
        react: '[data-page="show-detail"]'
      - name: hero
        original: '[data-page="show-detail"]'
        react: '[data-section="show-detail-hero"]'
  - page: calendar
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/calendar.html
    storyId: pyxis-app-pages-pages--calendar-mobile
    sections:
      - name: page
        original: '[data-page="calendar"]'
        react: '[data-page="calendar"]'
  - page: bookings
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/bookings.html
    storyId: pyxis-app-pages-pages--bookings-mobile
    sections:
      - name: page
        original: '[data-page="bookings"]'
        react: '[data-page="bookings"]'
      - name: queue
        original: '[data-page="bookings"]'
        react: '[data-section="bookings-queue"]'
  - page: booking-review
    variant: mobile
    priority: phase-8
    prototypePath: /standalone/mobile/booking-review.html
    storyId: pyxis-app-pages-pages--booking-review-mobile
    sections:
      - name: page
        original: '[data-page="booking-review"]'
        react: '[data-page="booking-review"]'
      - name: hero
        original: '[data-page="booking-review"]'
        react: '[data-section="booking-review-hero"]'
