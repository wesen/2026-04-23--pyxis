schemaVersion: pyxis.visual-suite.v1
name: public-pages
defaults:
  prototypeBase: http://localhost:7070
  storybookBase: http://localhost:6007
  viewport:
    width: 920
    height: 1460
  waitMs: 1000
  threshold: 30
  inspect: rich
  variant: desktop
policy:
  bands:
  - name: accepted
    maxChangedPercent: 0.5
  - name: review
    maxChangedPercent: 10
  - name: tune-required
    maxChangedPercent: 30
  - name: major-mismatch
    maxChangedPercent: 100
acceptedDifferences:
  shows:
    page:
      status: accepted-by-reviewer
      acceptedAt: '2026-04-27'
      reason: >-
        Manuel reviewed the remaining Shows full-page integration deltas and said
        the Shows page is visually fine. Keep component-level Shows targets and
        mailing-list/header rows as the primary regression signals; do not chase
        broad poster/list integration pixels unless new visual feedback appears.
      maxObservedChangedPercent: 11.620
    content:
      status: accepted-by-reviewer
      acceptedAt: '2026-04-27'
      reason: >-
        Same reviewer decision as shows/page; remaining difference is accepted
        for the current public-page parity pass.
      maxObservedChangedPercent: 11.620
    shows-list:
      status: accepted-by-reviewer
      acceptedAt: '2026-04-27'
      reason: >-
        Same reviewer decision as shows/page; representative component targets
        remain available for future focused tuning.
      maxObservedChangedPercent: 11.166
targets:
- page: shows
  variant: desktop
  priority: tune-first
  prototypePath: /standalone/public/shows.html
  storyId: public-site-pages-shows--desktop
  baselineDiffs:
    shows-list: 66.0368
    content: 52.4196
    page: 46.3495
    mailing-list: 9.9766
    header: 7.2648
  sections:
  - name: page
    original: '#root'
    react: '[data-story-frame=''pyxis-page-shell'']'
  - name: content
    original: '[data-page=''shows'']'
    react: '[data-page=''shows'']'
  - name: header
    original: '[data-section=''shows-header'']'
    react: '[data-section=''shows-header''] [data-pyxis-component=''public-page-header'']'
  - name: shows-list
    original: '[data-section=''shows-list'']'
    react: '[data-section=''shows-list'']'
  - name: mailing-list
    original: '[data-section=''mailing-list'']'
    react: '[data-section=''mailing-list'']'
- page: show-detail
