schemaVersion: pyxis.visual-suite.v1
name: public-pages
defaults:
  prototypeBase: http://localhost:7070
  storybookBase: http://localhost:6007
  viewport:
    width: 920
    height: 1460
  waitMs: 1000
  threshold: 30
  inspect: rich
  variant: desktop
policy:
  bands:
  - name: accepted
    maxChangedPercent: 0.5
  - name: review
    maxChangedPercent: 10
  - name: tune-required
    maxChangedPercent: 30
  - name: major-mismatch
    maxChangedPercent: 100
acceptedDifferences: {}
