name: public-pages
variant: desktop
prototypeBase: http://localhost:7070
storybookBase: http://localhost:6007
viewport:
  width: 920
  height: 1460
waitMs: 1000
threshold: 30
inspect: rich
pages:
  - page: shows
    variant: desktop
    priority: tune-first
    prototypePath: /standalone/public/shows.html
    storyId: public-site-pages--shows-desktop
    baselineDiffs:
      page: 50.5245
      content: 49.0940
      header: 51.0775
      shows-list: 66.8566
      mailing-list: 51.2191
    sections:
      - name: page
        original: "#root"
        react: "[data-story-frame='pyxis-page-shell']"
      - name: content
        original: "#root > *"
        react: "[data-page='shows']"
      - name: header
        original: "#root > *"
        react: "[data-section='shows-header']"
      - name: shows-list
        original: "#root > *"
        react: "[data-section='shows-list']"
      - name: mailing-list
        original: "#root > *"
        react: "[data-section='mailing-list']"
